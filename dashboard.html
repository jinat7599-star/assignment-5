<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Geist", sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <nav class="navbar bg-base-100 shadow-sm flex flex-wrap justify-between px-6 py-5 gap-2">
        <div class="flex items-center gap-2">
            <div class="w-10 rounded-full overflow-hidden">
                <img src="./assets/github-logo.png" alt="Logo">
            </div>
            <span class="font-medium">GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-2">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto pl-12 text-[#64748B] focus:outline-none" />
                <div class="absolute top-2 left-1 pl-4 cursor-pointer" id="searchBtn">
                    <i class="fa-solid fa-magnifying-glass opacity-60"></i>
                </div>
            </div>
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
        </div>
    </nav>
    <main class="container mx-auto max-w-7xl">
        <div class="flex gap-2 bg-base-100 shadow-sm p-6 mt-10 mx-4 md:mx-10 lg:mx-40 rounded-lg">
            <button class="btn" id="btn-all">All</button>
            <button class="btn" id="btn-open">Open</button>
            <button class="btn" id="btn-closed">Closed</button>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-base-100 shadow-sm p-6 my-4 mx-4 md:mx-10 lg:mx-40 rounded-lg">
            <div class="flex gap-3">
                <div class="p-2 w-12 h-12 bg-[#ECE4FF] rounded-full flex items-center justify-center">
                    <img src="./assets/Aperture.png" alt="Icon">
                </div>

                <div>
                    <h2 class="text-lg font-semibold" id="issue-count">0 Issues</h2>
                    <p class="text-sm text-neutral/50">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-4 text-sm font-medium">
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-full"></span>Open</div> 
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-purple-500 rounded-full"></span>Closed</div>
            </div>
        </div>
        <div id="card" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 my-4 gap-6 mx-4 md:mx-10 lg:mx-40">
            </div>
    </main>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl bg-white p-8"> 
            <div id="modal-content"></div>
        </div>
    </dialog>

    <script src="./scripts/dashboard.js"></script>
</body>
</html>
