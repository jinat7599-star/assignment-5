<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Geist", sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="card bg-white w-full max-w-md shadow-2xl rounded-2xl p-8 m-4"> 
        <header class="text-center mb-8">
            <img src="./assets/github-logo.png" alt="GitHub" class="mx-auto mb-4">
            <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </header>

        <form id="loginForm" class="space-y-4">
            <div class="form-control">
                <label class="label font-semibold text-xs uppercase tracking-wider text-gray-600">Username</label>
                <input type="text" id="username" class="input input-bordered focus:border-purple-500 outline-none" placeholder="Enter Username" required />
                <span class="text-xs text-purple-600 mt-1">Hint: admin</span>
            </div>
             <div class="form-control">
                <label class="label font-semibold text-xs uppercase tracking-wider text-gray-600">Password</label>
                <input type="password" id="password" class="input input-bordered focus:border-purple-500 outline-none" placeholder="Enter Password" required />
                <span class="text-xs text-purple-600 mt-1">Hint: admin123</span>
            </div>
            <button type="submit" id="signIn" class="btn btn-primary w-full mt-2">Sign In</button>
        </form>
        <div class="divider my-8 text-gray-400 font-bold">OR</div>

        <footer class="text-center">
            <p class="text-gray-400 text-xs mb-3 uppercase tracking-widest">Demo Credentials</p>
            <div class="bg-gray-50 border border-gray-100 py-4 px-6 rounded-xl inline-block w-full">
                <p class="text-sm"><strong>User:</strong> admin</p>
                <p class="text-sm"><strong>Pass:</strong> admin123</p>
            </div>
        </footer>
    </div>

    <script src="./scripts/login.js"></script>
</body>
</html>
